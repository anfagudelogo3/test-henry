---
# Airflow 2.9.3 — stack reducido con LocalExecutor + Postgres.
# 3 servicios de larga duración (postgres, webserver, scheduler) + 1 init de una sola vez.
# ~2-2.5 GB de RAM total. Sin Celery, sin Redis, sin Worker.
#
# Uso:
#   Levantar:  ./run_airflow.sh   (o: docker compose up -d --build)
#   Apagar:    docker compose down
#   Logs:      docker compose logs -f
#   UI:        http://localhost:8080  (admin / admin)

x-airflow-common: &airflow-common
  build: .
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    # El pickling de XCom permite que las tareas se pasen DataFrames de pandas entre sí.
    AIRFLOW__CORE__ENABLE_XCOM_PICKLING: "true"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__WEBSERVER__SECRET_KEY: "churn-demo-secret"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
  volumes:
    - ./dags:/opt/airflow/dags          # editable en vivo: no hace falta reconstruir para actualizar el DAG
    - ./data:/opt/airflow/data          # xlsx de entrada; CSVs procesados se escriben de vuelta al host
    - ./logs:/opt/airflow/logs          # logs por tarea visibles en el sistema de archivos del host
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    restart: always

  # Una sola ejecución: migra la DB y crea el usuario admin, luego termina.
  # El webserver y el scheduler esperan a que esto complete antes de iniciar.
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash       # reemplaza el entrypoint de Airflow para ejecutar bash directamente
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-db:
